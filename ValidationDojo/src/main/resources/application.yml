spring:
  application:
    name: ValidationDojo

  datasource:
    url: jdbc:sqlite:validationdojo.db
    driver-class-name: org.sqlite.JDBC
    username: root
    password: secret

  jpa:
    show-sql: true
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000/application/o/lonelysouls/

app:
  oidc:
    client-id: MiTVT9LO4R5bb3d80BuvpauOl9YuRyFvOigTUC7O
    revoke-uri: http://localhost:9000/application/o/revoke/

  doc:
    api-docs:
      path: /api-docs

server:
  port: 5003
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: changeit
    key-store-type: PKCS12
  forward-headers-strategy: native
  tomcat:
    remote-ip-header: x-forwarded-for
    protocol-header: x-forwarded-proto
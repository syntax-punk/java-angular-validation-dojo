<div class="mx-auto w-full p-2 pt-6 md:max-w-md">
  <form
    [formGroup]="newUserForm"
    class="relative w-[32rem] rounded-md border border-slate-100 bg-slate-50 px-6 py-2 shadow-md"
  >
    @if (isLoading()) {
      <div
        class="absolute top-0 left-0 z-10 flex h-full w-full items-center justify-center rounded-md bg-slate-50 opacity-50 shadow-md"
      >
        <h2 class="text-2xl font-semibold text-slate-800">Saving...</h2>
      </div>
    }

    <div class="mt-4 grid grid-cols-1 gap-6">
      <app-text-input
        [id]="'firstName'"
        [formControl]="newUserForm.controls['firstName']"
        [label]="'First Name'"
        required
      />

      <app-text-input
        [id]="'lastName'"
        [formControl]="newUserForm.controls['lastName']"
        [label]="'Last Name'"
        required
      />

      <app-text-input
        [id]="'username'"
        [formControl]="newUserForm.controls['username']"
        [label]="'Username'"
        required
      />

      <app-text-input
        [id]="'dob'"
        [formControl]="newUserForm.controls['dob']"
        [label]="'Date of Birth'"
        [type]="'date'"
      />

      <div>
        <label class="simple-form-label required">Gender</label>
        <select class="simple-form-field" formControlName="gender">
          <option [value]="'male'">Male</option>
          <option [value]="'female'">Female</option>
        </select>
        <app-form-field-error [fGroup]="newUserForm" cName="gender" />
      </div>

      <app-text-input
        [id]="'email'"
        [formControl]="newUserForm.controls['email']"
        [label]="'Email'"
        [type]="'email'"
        required
      />

      <app-text-input
        [id]="'phone'"
        [formControl]="newUserForm.controls['phone']"
        [label]="'Phone'"
      />

      <app-text-input
        [id]="'bio'"
        [formControl]="newUserForm.controls['bio']"
        [label]="'Bio'"
      />
    </div>
    <div class="mt-4 flex justify-end">
      <button
        class="form-submit-button"
        type="submit"
        (click)="submitForm()"
        [disabled]="isLoading() || newUserForm.invalid"
      >
        @if (isLoading()) {
          Loading
        } @else {
          Save
        }
      </button>
    </div>
  </form>
</div>
